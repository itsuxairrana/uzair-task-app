name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_CLAUDE_API_KEY: ${{ secrets.VITE_CLAUDE_API_KEY }}
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
          VITE_GROK_API_KEY: ${{ secrets.VITE_GROK_API_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run build

      - name: Add .htaccess for SPA routing
        run: |
          cat > dist/.htaccess << 'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteRule ^api/ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>
          EOF

      - name: Deploy to deploy branch (no force — linear history)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="https://x-access-token:${GITHUB_TOKEN}@github.com/itsuxairrana/uzair-task-app.git"

          git config user.email "deploy@uzairvisuals.com"
          git config user.name "Deploy Bot"

          # Clone existing deploy branch into a separate folder
          if git ls-remote --heads origin deploy | grep -q deploy; then
            git clone --branch deploy --depth 1 "$REPO" deploy_out
          else
            mkdir deploy_out
            cd deploy_out && git init && git remote add origin "$REPO" && git checkout -b deploy && cd ..
          fi

          # Replace all files with fresh build output (keep .git)
          cd deploy_out
          find . -mindepth 1 -not -path './.git*' -delete

          cp -r ../dist/. .

          git add -A
          git status

          # Only commit if something changed
          if ! git diff --staged --quiet; then
            git commit -m "deploy $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin deploy
            echo "Deployed successfully"
          else
            echo "No changes to deploy"
          fi
