name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_CLAUDE_API_KEY: ${{ secrets.VITE_CLAUDE_API_KEY }}
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
          VITE_GROK_API_KEY: ${{ secrets.VITE_GROK_API_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_API_URL: /api
        run: npm run build

      - name: Add .htaccess for SPA routing
        run: |
          cat > dist/.htaccess << 'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteRule ^api/ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>
          EOF

      - name: Push built files to deploy branch
        run: |
          git config user.email "deploy@uzairvisuals.com"
          git config user.name "Deploy Bot"

          # Save dist to temp BEFORE switching branches
          cp -r dist /tmp/deploy_dist

          # Fetch existing deploy branch
          git fetch origin deploy || true

          # Switch to deploy branch (existing) or create orphan if first time
          if git show-ref --quiet refs/remotes/origin/deploy; then
            git checkout -B deploy origin/deploy
          else
            git checkout --orphan deploy
          fi

          # Clear all tracked files
          git rm -rf . --quiet || true

          # Restore build from temp
          cp -r /tmp/deploy_dist/. .

          # Commit and push (no force — linear history)
          git add -A
          git commit -m "deploy $(date -u '+%Y-%m-%d %H:%M UTC')" --allow-empty
          git push origin deploy

      - name: Trigger Hostinger deploy
        run: |
          curl -s -X POST "${{ secrets.HOSTINGER_WEBHOOK }}"
          sleep 10
          curl -s "https://task.uzairvisuals.com/git-deploy.php?secret=uzair_deploy_2026"
