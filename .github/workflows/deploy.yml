name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_CLAUDE_API_KEY: ${{ secrets.VITE_CLAUDE_API_KEY }}
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
          VITE_GROK_API_KEY: ${{ secrets.VITE_GROK_API_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run build

      - name: Add .htaccess for SPA routing
        run: |
          cat > dist/.htaccess << 'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteRule ^api/ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>
          EOF

      - name: Push dist to deploy branch
        run: |
          git config user.email "deploy@uzairvisuals.com"
          git config user.name "Deploy Bot"
          # Checkout or create the deploy branch with no history conflicts
          git fetch origin deploy 2>/dev/null || true
          git checkout -B deploy
          # Remove everything except .git then copy dist contents
          git rm -rf . --quiet
          cp -r dist/. .
          git add -A
          git commit -m "deploy build $(date -u '+%Y-%m-%d %H:%M')" --allow-empty
          git push --force origin deploy
